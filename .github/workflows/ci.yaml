name: CI

on:
  push:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      CODECOV_FILE: build/coverage.txt
      GOCOVEROUT: build/coverage.txt
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go 
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Generate
        run: make generate format
      - name: No changed files
        run: git diff --name-status --exit-code
      - name: Lint
        run: make lint
      - name: Integration test
        run: make integration-test coverage
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ env.CODECOV_FILE }}

  image-build:
    name: Image Build
    if: github.actor!= 'dependabot-preview[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Skaffold
        uses: heypigeonhq/setup-skaffold@v1.0.0
        with:
          version: 2.14.1
      - name: Build images
        run: |
          mkdir build
          skaffold build --platform=linux/amd64,linux/arm64 --file-output=build/images.json
      - name: Archive image tags
        uses: actions/upload-artifact@v4
        with:
          name: images
          path: build/images.json
